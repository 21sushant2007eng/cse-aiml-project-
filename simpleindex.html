<!DOCTYPE html>
<html>
<head>
  <title>Oil Reserve Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a2e;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background-color: #16213e;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      border: 1px solid #f0a500;
    }

    h2 {
      text-align: center;
      color: #f0a500;
    }

    label {
      display: block;
      margin-top: 15px;
      color: #aaa;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      background: #0f3460;
      border: 1px solid #444;
      border-radius: 5px;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background-color: #f0a500;
      color: black;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #d4920a;
    }

    .result-box {
      margin-top: 20px;
      background: #0f3460;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }

    .result-box p {
      margin: 8px 0;
      font-size: 15px;
    }

    .result-box span {
      color: #f0a500;
      font-weight: bold;
    }

    .error {
      color: #ff6b6b;
      margin-top: 10px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🛢 Oil Reserve Calculator</h2>

  <label>Reservoir Area (acres)</label>
  <input type="number" id="area" placeholder="e.g. 500">

  <label>Net Thickness (feet)</label>
  <input type="number" id="thickness" placeholder="e.g. 100">

  <label>Porosity (%)</label>
  <input type="number" id="porosity" placeholder="e.g. 18">

  <label>Water Saturation (%)</label>
  <input type="number" id="water_sat" placeholder="e.g. 30">

  <button onclick="calculate()">Calculate</button>

  <p class="error" id="error-msg">⚠ Could not connect to server. Run app.py first.</p>

  <div class="result-box" id="result-box">
    <p>Total Oil in Place: <span id="stoiip">-</span> Million Barrels</p>
    <p>Recoverable Oil:    <span id="recoverable">-</span> Million Barrels</p>
    <p>Recovery Factor:    <span id="rf">-</span>%</p>
  </div>
</div>

<script>
  async function calculate() {

    // Get input values
    var area      = document.getElementById('area').value;
    var thickness = document.getElementById('thickness').value;
    var porosity  = document.getElementById('porosity').value;
    var water_sat = document.getElementById('water_sat').value;

    // Basic check
    if (!area || !thickness || !porosity || !water_sat) {
      alert("Please fill in all fields.");
      return;
    }

    // Send to Python backend
    try {
      var response = await fetch('http://localhost:5000/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          area:      area,
          thickness: thickness,
          porosity:  porosity,
          water_sat: water_sat
        })
      });

      var result = await response.json();

      // Show results
      document.getElementById('stoiip').textContent      = result.stoiip;
      document.getElementById('recoverable').textContent = result.recoverable;
      document.getElementById('rf').textContent          = result.recovery_factor;
      document.getElementById('result-box').style.display = 'block';
      document.getElementById('error-msg').style.display  = 'none';

    } catch (error) {
      document.getElementById('error-msg').style.display = 'block';
    }
  }
</script>

</body>
</html>
